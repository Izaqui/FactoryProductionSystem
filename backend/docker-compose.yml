version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: factory-postgres
    restart: always
    environment:
      POSTGRES_DB: factorydb
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: